<section class="hero">
  <div class="hero__overlay"></div>

  <div class="hero__layout">
    <div class="hero__text">
      <h1 class="hero__title">
        <span class="hero__title-line hero__title-line--accent">Mis on ründedroonid</span>
        <span class="hero__title-line">ja kuidas ennast kaitsta</span>
      </h1>
      <p class="hero__subtitle">Droonisõja ABC</p>
      <p class="hero__intro">
        Droonid mängivad nii sõjas kui rahus aina suuremat rolli. See lehekülg seletab lihtsas ja selges keeles, milliseid droone on olemas, kuidas neid kasutatakse ning kuidas ohuolukorras ennast nende eest kaitsta.      </p>
    </div>

    <div class="hero__visual">
      <svg class="hero__drone" viewBox="0 0 400 360" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <!-- Rotor wash halos -->
        <circle cx="78" cy="82" r="58" fill="#4a90d9" opacity="0.05"/>
        <circle cx="322" cy="82" r="58" fill="#4a90d9" opacity="0.05"/>
        <circle cx="78" cy="278" r="58" fill="#4a90d9" opacity="0.05"/>
        <circle cx="322" cy="278" r="58" fill="#4a90d9" opacity="0.05"/>

        <!-- Spinning prop blur ellipses -->
        <ellipse cx="78" cy="82" rx="58" ry="6" fill="none" stroke="#4a90d9" stroke-width="1.4" opacity="0.55" class="hero__rotor hero__rotor--1"/>
        <ellipse cx="322" cy="82" rx="58" ry="6" fill="none" stroke="#4a90d9" stroke-width="1.4" opacity="0.55" class="hero__rotor hero__rotor--2"/>
        <ellipse cx="78" cy="278" rx="58" ry="6" fill="none" stroke="#4a90d9" stroke-width="1.4" opacity="0.55" class="hero__rotor hero__rotor--3"/>
        <ellipse cx="322" cy="278" rx="58" ry="6" fill="none" stroke="#4a90d9" stroke-width="1.4" opacity="0.55" class="hero__rotor hero__rotor--4"/>

        <!-- Carbon-fiber X-frame arms (silhouette trapezoids) -->
        <path d="M68 78 L194 168 L194 184 L68 94 Z" fill="#050a10"/>
        <path d="M332 78 L206 168 L206 184 L332 94 Z" fill="#050a10"/>
        <path d="M68 282 L194 192 L194 208 L68 298 Z" fill="#050a10"/>
        <path d="M332 282 L206 192 L206 208 L332 298 Z" fill="#050a10"/>

        <!-- Suspended warhead/payload (drawn before body so the body covers its middle) -->
        <line x1="184" y1="200" x2="184" y2="218" stroke="#a0aec0" stroke-width="1.1" opacity="0.85"/>
        <line x1="216" y1="200" x2="216" y2="218" stroke="#a0aec0" stroke-width="1.1" opacity="0.85"/>
        <rect x="184" y="200" width="32" height="100" fill="#0a131c" stroke="#4a90d9" stroke-width="1.4"/>
        <path d="M184 300 L216 300 L200 340 Z" fill="#0a131c" stroke="#4a90d9" stroke-width="1.4"/>
        <line x1="184" y1="225" x2="216" y2="225" stroke="#4a90d9" stroke-width="0.8" opacity="0.6"/>
        <line x1="184" y1="282" x2="216" y2="282" stroke="#4a90d9" stroke-width="0.8" opacity="0.6"/>
        <rect x="190" y="245" width="20" height="22" fill="#f0a500" opacity="0.7"/>
        <path d="M190 245 L210 267 M210 245 L190 267" stroke="#0a131c" stroke-width="1" opacity="0.5"/>

        <!-- Motor housings -->
        <circle cx="78" cy="82" r="16" fill="#0a131c" stroke="#4a90d9" stroke-width="1.5"/>
        <circle cx="322" cy="82" r="16" fill="#0a131c" stroke="#4a90d9" stroke-width="1.5"/>
        <circle cx="78" cy="278" r="16" fill="#0a131c" stroke="#4a90d9" stroke-width="1.5"/>
        <circle cx="322" cy="278" r="16" fill="#0a131c" stroke="#4a90d9" stroke-width="1.5"/>

        <!-- Motor stator inner rings -->
        <circle cx="78" cy="82" r="10" fill="none" stroke="#4a90d9" stroke-width="0.8" opacity="0.6"/>
        <circle cx="322" cy="82" r="10" fill="none" stroke="#4a90d9" stroke-width="0.8" opacity="0.6"/>
        <circle cx="78" cy="278" r="10" fill="none" stroke="#4a90d9" stroke-width="0.8" opacity="0.6"/>
        <circle cx="322" cy="278" r="10" fill="none" stroke="#4a90d9" stroke-width="0.8" opacity="0.6"/>

        <!-- Motor center caps -->
        <circle cx="78" cy="82" r="3.5" fill="#4a90d9"/>
        <circle cx="322" cy="82" r="3.5" fill="#4a90d9"/>
        <circle cx="78" cy="278" r="3.5" fill="#4a90d9"/>
        <circle cx="322" cy="278" r="3.5" fill="#4a90d9"/>

        <!-- Center electronics stack / frame plate -->
        <path d="M152 165 L248 165 L256 220 L144 220 Z" fill="#0a131c" stroke="#4a90d9" stroke-width="1.5"/>

        <!-- LiPo battery on top -->
        <rect x="170" y="175" width="60" height="36" rx="3" fill="#050a10" stroke="#4a90d9" stroke-width="1.2"/>
        <line x1="186" y1="173" x2="186" y2="213" stroke="#a0aec0" stroke-width="1" opacity="0.7"/>
        <line x1="214" y1="173" x2="214" y2="213" stroke="#a0aec0" stroke-width="1" opacity="0.7"/>
        <line x1="172" y1="193" x2="228" y2="193" stroke="#4a90d9" stroke-width="0.5" opacity="0.5"/>

        <!-- FPV camera (front protrusion with lens) -->
        <path d="M184 165 L216 165 L218 142 L182 142 Z" fill="#0a131c" stroke="#4a90d9" stroke-width="1.3"/>
        <circle cx="200" cy="153" r="9" fill="#020508"/>
        <circle cx="200" cy="153" r="7.2" fill="none" stroke="#f0a500" stroke-width="1.5"/>
        <circle cx="200" cy="153" r="3.5" fill="#f0a500" opacity="0.9"/>
        <circle cx="202" cy="151" r="1.3" fill="#fff" opacity="0.85"/>

        <!-- VTX antenna mount (top-down: post + radiating signal) -->
        <circle cx="240" cy="183" r="4.5" fill="#0a131c" stroke="#a0aec0" stroke-width="1.1"/>
        <circle cx="240" cy="183" r="2" fill="#f0a500" opacity="0.7" class="hero__blink"/>

        <!-- Status LEDs -->
        <circle cx="156" cy="180" r="2" fill="#f0a500" opacity="0.85" class="hero__blink"/>
        <circle cx="156" cy="205" r="2" fill="#4a90d9" opacity="0.7"/>
        <circle cx="244" cy="208" r="2" fill="#4a90d9" opacity="0.7"/>

        <!-- Signal waves radiating from antenna -->
        <circle cx="240" cy="183" r="11" fill="none" stroke="#4a90d9" stroke-width="0.8" opacity="0.4" class="hero__signal hero__signal--1"/>
        <circle cx="240" cy="183" r="17" fill="none" stroke="#4a90d9" stroke-width="0.8" opacity="0.3" class="hero__signal hero__signal--2"/>
      </svg>
    </div>
  </div>

  <div class="hero__scroll-hint" aria-hidden="true">
    <span class="hero__scroll-arrow"></span>
  </div>
</section>
