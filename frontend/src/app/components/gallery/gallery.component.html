<div class="gallery">
  <h2 class="gallery__title">Multirootordroonide näiteid</h2>

  <div class="gallery__grid">
    @for (drone of drones; track drone.description) {
      <button class="gallery__card" (click)="openLightbox(drone)">
        <div class="gallery__card-image">
          <img [src]="drone.image" [alt]="drone.description" loading="lazy" />
        </div>
        <p class="gallery__card-desc">{{ drone.description }}</p>
      </button>
    }
  </div>
</div>

@if (selectedDrone) {
  <div class="lightbox" role="dialog" aria-modal="true" aria-label="Drooni andmed" (click)="closeLightbox()" (keydown.escape)="closeLightbox()">
    <div class="lightbox__content" role="document" (click)="$event.stopPropagation()" (keydown)="$event.stopPropagation()">
      <button class="lightbox__close" aria-label="Sulge" (click)="closeLightbox()">&times;</button>
      <div class="lightbox__image">
        <img [src]="selectedDrone.image" [alt]="selectedDrone.description" />
      </div>
      <p class="lightbox__desc">{{ selectedDrone.description }}</p>
    </div>
  </div>
}
