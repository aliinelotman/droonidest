<!-- Section Nav (top bar + sidebar) -->
<app-section-nav #sectionNav [sections]="navSections" [moduleLinks]="moduleLinks" />

<div class="module-two">
  <!-- Hero -->
  <div id="hero">
    <app-hero-section />
  </div>

  <!-- Info Cards -->
  <section id="overview" class="section section--alt">
    <div class="container">
      <div class="info-cards-grid" #fadeTarget class="fade-in info-cards-grid">
        <app-info-card
          title="Surveillance Platforms"
          body="Reconnaissance drones provide persistent intelligence, surveillance, and reconnaissance (ISR) capabilities far beyond what traditional manned aircraft can offer. Operating for hours or even days at a time, they deliver real-time imagery and signals intelligence to commanders on the ground."
          accentColor="var(--color-accent)"
        />
        <app-info-card
          title="Sensor Fusion"
          body="Modern ISR drones carry electro-optical, infrared, and synthetic-aperture radar sensors simultaneously. Fusing data from multiple sensors creates a comprehensive picture that no single system could achieve alone, enabling all-weather, day-and-night operations."
          accentColor="var(--color-accent-blue)"
        />
        <app-info-card
          title="Data Links & Relay"
          body="The vast amounts of data generated by reconnaissance platforms must be transmitted securely and in real time. High-bandwidth satellite links, mesh networking between drones, and edge processing keep critical intelligence flowing even in contested environments."
          accentColor="var(--color-danger)"
        />
      </div>
    </div>
  </section>

  <!-- Narrative -->
  <section class="section">
    <div class="container" #fadeTarget class="fade-in container">
      <app-narrative-section
        heading="Silent Watchers"
        body="Long before any strike is authorized, reconnaissance drones are already overhead. They map terrain, track movements, and build patterns of life — the daily routines that reveal where targets sleep, train, and resupply. This persistent surveillance transforms raw geography into actionable intelligence, giving commanders an unprecedented understanding of the battlespace."
        imageAlt="Reconnaissance drone surveillance illustration"
      />
    </div>
  </section>

  <!-- Gallery -->
  <section id="gallery" class="section section--alt">
    <div class="container" #fadeTarget class="fade-in container">
      <app-gallery />
    </div>
  </section>

  <!-- Operations Narrative -->
  <section id="operations" class="section section--alt">
    <div class="container" #fadeTarget class="fade-in container">
      <app-narrative-section
        heading="Eyes Without Borders"
        body="Reconnaissance drones operate across every domain — from high-altitude global hawks cruising at 18,000 meters to hand-launched tactical systems used by infantry squads. Their ability to loiter over areas of interest for extended periods makes them invaluable for border surveillance, maritime patrol, and disaster response alongside their traditional military roles."
        imageAlt="Multi-domain drone operations diagram"
        [reverse]="true"
      />
    </div>
  </section>

  <!-- Fun Facts -->
  <section class="section">
    <div class="container">
      <div #fadeTarget class="fade-in fun-facts-grid">
        <app-fun-fact
          label="Max Altitude"
          value="18,000m"
          description="The RQ-4 Global Hawk operates at extreme altitudes, surveying vast areas from the edge of the stratosphere."
        />
        <app-fun-fact
          label="Coverage Area"
          value="100,000 km²"
          description="A single high-altitude ISR drone can survey an area the size of a small country in a single sortie."
        />
        <app-fun-fact
          label="Data per Sortie"
          value="10+ TB"
          description="Modern sensor payloads generate terabytes of imagery and signals data during each mission."
        />
      </div>
    </div>
  </section>

  <!-- Future Narrative -->
  <section id="future" class="section section--alt">
    <div class="container" #fadeTarget class="fade-in container">
      <app-narrative-section
        heading="The Intelligence Edge"
        body="Next-generation reconnaissance platforms will leverage artificial intelligence to process sensor data onboard, identifying objects of interest and flagging anomalies before any human analyst reviews the footage. This 'sensor-to-shooter' acceleration means that the time between detection and decision will shrink from hours to seconds."
        imageAlt="AI-powered reconnaissance concept"
      />
    </div>
  </section>

  <!-- Closing -->
  <section class="section section--alt">
    <div class="container" #fadeTarget class="fade-in container">
      <app-closing-section />
    </div>
  </section>

  <!-- Quiz -->
  <section id="quiz" class="section">
    <div class="container" #fadeTarget class="fade-in container">
      <app-quiz />
    </div>
  </section>

  <!-- More Modules -->
  <section id="modules" class="section section--alt">
    <div class="container" #fadeTarget class="fade-in container">
      <h2 class="modules-heading">Explore More Modules</h2>
      <div class="modules-grid">
        <app-module-card
          headline="Module One"
          intro="Combat drones and the evolution of aerial warfare."
          link="/"
        />
        <app-module-card
          headline="Module Three"
          intro="Advanced tactics and electronic warfare."
          [disabled]="true"
        />
        <app-module-card
          headline="Module Four"
          intro="The ethics and future of autonomous combat."
          [disabled]="true"
        />
      </div>
    </div>
  </section>

</div>
