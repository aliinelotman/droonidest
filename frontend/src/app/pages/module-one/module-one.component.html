<!-- Section Nav (top bar + sidebar) -->
<app-section-nav #sectionNav [sections]="navSections" [moduleLinks]="moduleLinks" />

<div class="module-one">
  <!-- Hero -->
  <div id="hero">
    <app-hero-section />
  </div>

  <!-- Narrative: Multirootordroonid ja FPV -->
  <section id="overview" class="section">
    <div class="fade-in container" #fadeTarget>
      <app-narrative-section
        heading="Multirootordroonid ja FPV"
        body="Mitme tiivikuga väikesed droonid, mida kasutatakse palju ka hobideks ja igapäevatööks väljaspool sõjakonteksti, nö 'tavaline poedroon'. Kuidas teda ära tunda? Nagu droonifotograaf Kaupo Kalda kirjutab: 'Tavaline poedroon näeb välja nagu lendav kassipoeg, jalad laiali. Ta on umbes paberilehe suurune, tal on 4 käppa, 4 propellerit ja tihti seisatab, teeb pilti ja vahetab taas asukohta.'

Rootorite arv võib sellisel droonil olla kolmest kaheksani, tavaliselt oleme harjunud nägema nelja rootoriga droone.

Kui sellisele droonile lisada juurde kaamera, saab temast 'first person view' ehk FPV droon ning seda juhitakse kaamerast nähtava otsepildi abil, mida edastatakse raadiolainete teel droonipiloodile. Sõjalises kontekstis kasutatakse multirootor ja FPV droone näiteks luurel kas tava- või termokaamera pildi abil andmete kogumiseks. Samuti on Ukraina sõjas kasutusel ka poedroonidest ümber ehitatud või kohapeal valmistatud FPV droone, millele lisatakse väike lõhkekeha.

Kuna rindel kasutavad mõlemad osapooled raadiolainete segajaid, on viimastel aastatel väikeseid FPV rünnakdroone hakatud juhtima fiiberoptiliste kaabite abil, mida droon lennates alaosas asuvast kassetist lahti kerib. Kaabli abil saadetakse piloodile videopilti ning piloodilt tagasi droonile sõidujuhiseid."
        imageUrl="https://upload.wikimedia.org/wikipedia/commons/0/04/UA_military_FPV_drones_10.jpg"
        imageAlt="Ukraina sõdur hoiab käes lõhkekehaga varustatud väikest FPV kvadrokopterit; taustal põllul on näha suitsu (Ukraina relvajõud, Wikimedia Commons)"
      />
    </div>
  </section>

   <!-- Drone Assembly Exercise -->
   <section id="exercise" class="section">
    <div class="fade-in container" #fadeTarget>
      <app-drone-assembly />
    </div>
  </section>

  <!-- Gallery -->
  <section id="gallery" class="section section--alt">
    <div class="fade-in container" #fadeTarget>
      <app-gallery />
    </div>
  </section>

  <!-- Command & Control Narrative -->
  <section id="operations" class="section section--alt">
    <div class="fade-in container" #fadeTarget>
      <app-narrative-section
        heading="Juhtimine ja side"
        body="Lahingudroonide operatsioonid tuginevad mitmetasandilisele juhtimisstruktuurile, mis ühendab maapealsed juhtimiskeskused releesatelliitide kaudu drooniga endaga. Operaatorid võivad asuda oma droonidest täiesti teisel kontinendil, ühendatuna krüpteeritud satelliidikanalite kaudu, mille viivitus on mõõdetav millisekundites. Selline hajutatud ülesehitus muudab droonioperatsioonid vastupidavaks – isegi kui üks side katkeb, suudab droon järgida etteprogrammeeritud teekonnapunkte, kuni ühendus taastatakse."
        imageAlt="Juhtimis- ja sidevõrgu skeem"
        [reverse]="true"
      />
    </div>
  </section>

  <!-- Fun Facts -->
  <section class="section">
    <div class="container">
      <div #fadeTarget class="fade-in fun-facts-grid">
        <app-fun-fact
          label="Maksimaalne lennuaeg"
          value="40+ h"
          description="MQ-9 Reaper suudab õhus püsida üle 27 tunni; eksperimentaalsed päikeseenergial töötavad droonid on ületanud 40 tundi."
        />
        <app-fun-fact
          label="Tegevuslagi"
          value="15 000 m"
          description="Suurel kõrgusel lendavad droonid tegutsevad enamiku ilmastikusüsteemide kohal ja kaugelt väljaspool kaasaskantavate õhutõrjerelvade ulatust."
        />
        <app-fun-fact
          label="Parve suurus"
          value="103"
          description="2017. aastal demonstreeris USA Kaitseministeerium 103 Perdix mikrodroonist koosnevat parve, mis tegutses ühise otsustamisega."
        />
      </div>
    </div>
  </section>

  <!-- Changing the Battlefield -->
  <section class="section section--alt">
    <div class="fade-in container" #fadeTarget>
      <app-narrative-section
        heading="Lahinguvälja muutumine"
        body="Soodsate lahingudroonide levik on demokratiseerinud õhusõja. Riigid ja mitteriiklikud osapooled, kes ei suudaks endale kunagi tavalist õhuväge lubada, käsutavad nüüd tõhusaid drooniparki. 2020. aasta Mägi-Karabahhi konflikt näitas, et Türgi TB2 droonide parv suudab neutraliseerida soomuskolonne ja õhutõrjesüsteeme, mis maksavad kordades rohkem. See asümmeetria kujundab ümber kaitse-eelarveid ja sõjalist doktriini kogu maailmas."
        imageAlt="Lahinguvälja muutumise illustratsioon"
      />
    </div>
  </section>

  <!-- Quiz -->
  <section id="quiz" class="section section--alt">
    <div class="fade-in container" #fadeTarget>
      <app-quiz />
    </div>
  </section>

  <!-- More Modules -->
  <section id="modules" class="section">
    <div class="fade-in container" #fadeTarget>
      <h2 class="modules-heading">Vaata teisi mooduleid</h2>
      <div class="modules-grid">
        <app-module-card
          headline="Moodul 2"
          intro="Jätka oma teekonda mehitamata õhusõidukite maailmas."
          link="/module-two"
          [locked]="isModuleTwoLocked()"
          (loginRequested)="authService.loginWithGoogle()"
        />
        <app-module-card
          headline="Moodul 3"
          intro="Edasijõudnud taktika ja elektrooniline sõjapidamine."
          [disabled]="true"
        />
        <app-module-card
          headline="Moodul 4"
          intro="Autonoomse lahingu eetika ja tulevik."
          [disabled]="true"
        />
      </div>
    </div>
  </section>

</div>
