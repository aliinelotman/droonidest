<!-- Section Nav (top bar + sidebar) -->
<app-section-nav #sectionNav [sections]="navSections" [moduleLinks]="moduleLinks" />

<div class="module-one">
  <!-- Hero -->
  <div id="hero">
    <app-hero-section />
  </div>

  <!-- Info Cards -->
  <section id="overview" class="section section--alt">
    <div class="container">
      <div class="fade-in info-cards-grid" #fadeTarget>
        <app-info-card
          title="Precision and Power"
          body="Ründedroonid on mehitamata õhusõidukid (UAV – Unmanned Aerial Vehicle), mida kasutatakse sõjalistel eesmärkidel vaenlase sihtmärkide ründamiseks. Need võivad olla varustatud rakettide, pommide või muude relvasüsteemidega ning neid juhitakse eemalt operaatori poolt või need töötavad osaliselt autonoomselt. Ründedroonid võimaldavad sooritada täppisründeid ilma pilooti ohtu seadmata ning neid kasutatakse nii riiklike relvajõudude kui ka mitteriigiliste osalejate poolt üha sagedamini kaasaegsetes konfliktides."
          accentColor="var(--color-accent)"
        />
        <app-info-card
          title="Eyes in the Sky"
          body="Ründedroonide peamisteks eelisteks peetakse nende kulutõhusust, paindlikkust ja võimet viibida õhus pikka aega. Tuntumad näited on Ameerika Ühendriikide MQ-9 Reaper ja Türgi Bayraktar TB2, mida on laialdaselt kasutatud Ukraina, Süüria ja Mägi-Karabahhi konfliktides. Samas tõstatavad ründedroonid tõsiseid eetilisi ja õiguslikke küsimusi seoses tsiviilohvrite, vastutuse ja rahvusvahelise humanitaarõiguse järgimisega. Droonitehnoloogia kiire areng on muutnud kaasaegse sõjapidamise olemust märkimisväärselt."
          accentColor="var(--color-accent-blue)"
        />
        <app-info-card
          title="Payloads: Tools of the Mission"
          body="From Hellfire missiles and laser-guided bombs to electronic warfare pods, a drone's payload defines its role. Loitering munitions blur the line between reconnaissance and attack, becoming the weapon themselves upon impact."
          accentColor="var(--color-danger)"
        />
      </div>
    </div>
  </section>

  <!-- Narrative: Lock On -->
  <section class="section">
    <div class="fade-in container" #fadeTarget>
      <app-narrative-section
        heading="Lock On"
        body="A mission begins long before a trigger is pulled. Intelligence analysts identify targets using satellite imagery and signals intercepts. The drone is tasked, launched, and flown to a loiter point — sometimes thousands of kilometers from its pilot. Through a satellite datalink, the operator watches, waits, and when the moment is right, executes with surgical precision. The target never sees it coming."
        imageAlt="Drone mission planning illustration"
      />
    </div>
  </section>

  <!-- Gallery -->
  <section id="gallery" class="section section--alt">
    <div class="fade-in container" #fadeTarget>
      <app-gallery />
    </div>
  </section>

  <!-- Command & Control Narrative -->
  <section id="operations" class="section section--alt">
    <div class="fade-in container" #fadeTarget>
      <app-narrative-section
        heading="Command and Control"
        body="Combat drone operations rely on a layered command structure linking ground control stations to relay satellites to the aircraft itself. Operators can be stationed on different continents from their drones, connected through encrypted satellite uplinks with latency measured in milliseconds. This distributed architecture makes drone operations resilient — even if one link is disrupted, the drone can follow pre-programmed waypoints until contact is re-established."
        imageAlt="Command and control network diagram"
        [reverse]="true"
      />
    </div>
  </section>

  <!-- Fun Facts -->
  <section class="section">
    <div class="container">
      <div #fadeTarget class="fade-in fun-facts-grid">
        <app-fun-fact
          label="Max Endurance"
          value="40+ hrs"
          description="The MQ-9 Reaper can stay airborne for over 27 hours; experimental solar-powered drones have exceeded 40."
        />
        <app-fun-fact
          label="Operational Ceiling"
          value="15,000m"
          description="High-altitude drones operate above most weather systems and well beyond the range of portable anti-aircraft weapons."
        />
        <app-fun-fact
          label="Swarm Size"
          value="103"
          description="In 2017, the US DoD demonstrated a swarm of 103 Perdix micro-drones operating with shared decision-making."
        />
      </div>
    </div>
  </section>

  <!-- Changing the Battlefield -->
  <section class="section section--alt">
    <div class="fade-in container" #fadeTarget>
      <app-narrative-section
        heading="Changing the Battlefield"
        body="The proliferation of affordable combat drones has democratized aerial warfare. Nations and non-state actors that could never afford conventional air forces now field effective drone fleets. The 2020 Nagorno-Karabakh conflict demonstrated that a fleet of Turkish TB2 drones could neutralize armored columns and air defense systems that cost orders of magnitude more. This asymmetry is reshaping defense budgets and military doctrine worldwide."
        imageAlt="Battlefield transformation illustration"
      />
    </div>
  </section>

  <!-- Future of Aerial Warfare -->
  <section id="future" class="section">
    <div class="fade-in container" #fadeTarget>
      <app-narrative-section
        heading="The Future of Aerial Warfare"
        body="Next-generation combat drones will operate in coordinated swarms, sharing targeting data and autonomously distributing tasks among themselves. Loyal wingman programs pair unmanned aircraft with manned fighters, extending a pilot's sensor and weapons reach without risking additional lives. Sixth-generation air combat concepts envision optionally-manned platforms where the same airframe can fly with or without a human on board, depending on the mission risk."
        imageAlt="Future drone swarm concept"
        [reverse]="true"
      />
    </div>
  </section>

  <!-- Closing -->
  <section class="section">
    <div class="fade-in container" #fadeTarget>
      <app-closing-section />
    </div>
  </section>

  <!-- Drone Assembly Exercise -->
  <section id="exercise" class="section">
    <div class="fade-in container" #fadeTarget>
      <app-drone-assembly />
    </div>
  </section>

  <!-- Quiz -->
  <section id="quiz" class="section section--alt">
    <div class="fade-in container" #fadeTarget>
      <app-quiz />
    </div>
  </section>

  <!-- More Modules -->
  <section id="modules" class="section">
    <div class="fade-in container" #fadeTarget>
      <h2 class="modules-heading">Explore More Modules</h2>
      <div class="modules-grid">
        <app-module-card
          headline="Module Two"
          intro="Continue your journey into the world of unmanned aerial systems."
          link="/module-two"
          [locked]="isModuleTwoLocked()"
          (loginRequested)="authService.loginWithGoogle()"
        />
        <app-module-card
          headline="Module Three"
          intro="Advanced tactics and electronic warfare."
          [disabled]="true"
        />
        <app-module-card
          headline="Module Four"
          intro="The ethics and future of autonomous combat."
          [disabled]="true"
        />
      </div>
    </div>
  </section>

</div>
