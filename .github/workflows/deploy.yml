name: Build and Deploy

on:
  workflow_dispatch:
  push:
    branches: [main, develop]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      SSH_USER: ${{ secrets.SSH_USER }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      SERVER_IP: ${{ secrets.SERVER_IP }}
      DEPLOY_PATH: ~/droonidest-deploy
      ENV_PRODUCTION_FILE: ${{ secrets.ENV_PRODUCTION_FILE }}
      DOCKER_COMPOSE_FILE: docker-compose.prod.yaml

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan "$SERVER_IP" >> ~/.ssh/known_hosts

      - name: Create .env.production from secret
        run: |
          printf '%s\n' "$ENV_PRODUCTION_FILE" > .env.production

      - name: Create deployment package
        run: |
          tar czf deployment.tar.gz \
            backend/ \
            frontend/ \
            nginx/ \
            "$DOCKER_COMPOSE_FILE" \
            .env.production

      - name: Copy deployment package to server
        run: |
          scp -i ~/.ssh/id_rsa \
            -o StrictHostKeyChecking=yes \
            deployment.tar.gz \
            "$SSH_USER@$SERVER_IP:/tmp/"

      - name: Deploy on server
        run: |
          ssh -i ~/.ssh/id_rsa \
            -o StrictHostKeyChecking=yes \
            "$SSH_USER@$SERVER_IP" << 'EOF'
          set -e

          mkdir -p ~/droonidest-deploy
          cd ~/droonidest-deploy

          tar xzf /tmp/deployment.tar.gz
          rm /tmp/deployment.tar.gz

          if [ ! -f docker-compose.prod.yaml ]; then
            echo "ERROR: docker-compose.prod.yaml not found!"
            exit 1
          fi

          if [ -f .env.production ]; then
            cp .env.production .env
          fi

          docker compose -f docker-compose.prod.yaml down

          docker compose -f docker-compose.prod.yaml build --no-cache

          echo "Starting infrastructure services..."
          docker compose -f docker-compose.prod.yaml up -d postgres minio
          sleep 10

          echo "Starting backend..."
          docker compose -f docker-compose.prod.yaml up -d backend
          echo "Waiting for backend to become healthy (up to 2 min)..."
          for i in $(seq 1 24); do
            sleep 5
            CID=$(docker compose -f docker-compose.prod.yaml ps -q backend 2>/dev/null || true)
            if [ -z "$CID" ]; then
              echo "  backend container not found"
              continue
            fi
            STATUS=$(docker inspect --format='{{.State.Status}}' "$CID" 2>/dev/null || echo unknown)
            HEALTH=$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}no-healthcheck{{end}}' "$CID" 2>/dev/null || echo unknown)
            echo "  [$i] container=$STATUS health=$HEALTH"
            if [ "$HEALTH" = "healthy" ]; then
              echo "Backend is healthy!"
              break
            fi
            if [ "$STATUS" = "exited" ] || [ "$STATUS" = "dead" ]; then
              echo "ERROR: Backend container exited. Logs:"
              docker compose -f docker-compose.prod.yaml logs backend --tail=300
              exit 1
            fi
          done

          CID=$(docker compose -f docker-compose.prod.yaml ps -q backend 2>/dev/null || true)
          HEALTH=$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}no-healthcheck{{end}}' "$CID" 2>/dev/null || echo unknown)
          if [ "$HEALTH" != "healthy" ]; then
            echo "ERROR: Backend not healthy after wait (health=$HEALTH). Logs:"
            docker compose -f docker-compose.prod.yaml logs backend --tail=300
            echo "--- healthcheck log ---"
            docker inspect --format='{{range .State.Health.Log}}{{.Output}}{{end}}' "$CID" 2>/dev/null || true
            exit 1
          fi

          echo "Starting frontend..."
          docker compose -f docker-compose.prod.yaml up -d frontend

          echo "Deployment complete!"
          docker compose -f docker-compose.prod.yaml ps
          EOF
