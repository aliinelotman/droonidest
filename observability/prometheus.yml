global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert_rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: 'spring-boot'
    static_configs:
      - targets: ['backend:8080']
    metrics_path: '/actuator/prometheus'
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
